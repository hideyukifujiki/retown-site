<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C04580"/>
      <stop offset="60%" stop-color="#A83A6E"/>
      <stop offset="100%" stop-color="#7E2A52"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#FFD08A" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FFD08A" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFD08A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1.3" fill="#FFD08A" fill-opacity="0.16"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- accent stripes -->
  <g opacity="0.12">
    <path d="M -150,500 L 450,-100 L 540,-100 L -60,500 Z" fill="#FFD08A"/>
    <path d="M 850,800 L 1450,200 L 1540,200 L 940,800 Z" fill="#FFD08A"/>
  </g>

  <!-- frame -->
  <rect x="50" y="50" width="1100" height="530" fill="none" stroke="#FFD08A" stroke-opacity="0.35" stroke-width="2" rx="18"/>

  <!-- eyebrow pill -->
  <g transform="translate(600, 175)">
    <rect x="-220" y="-26" width="440" height="44" fill="rgba(0,0,0,0.20)" rx="22"/>
    <text x="0" y="5" font-family="'Poppins', 'Noto Sans JP', sans-serif" font-size="18" font-weight="700" fill="#FFD08A" text-anchor="middle" letter-spacing="5">
      RECYCLE SHOP GUIDE / FUKUOKA
    </text>
  </g>

  <!-- main title -->
  <g transform="translate(600, 295)">
    <text x="0" y="0" font-family="'Noto Sans JP', sans-serif" font-size="60" font-weight="900" fill="#FFFFFF" text-anchor="middle">
      福岡のおすすめ
    </text>
    <text x="0" y="78" font-family="'Noto Sans JP', sans-serif" font-size="60" font-weight="900" fill="#FFFFFF" text-anchor="middle">
      <tspan fill="#FFD08A">リサイクルショップ</tspan>・出張買取
    </text>
  </g>

  <!-- subtitle -->
  <g transform="translate(600, 480)">
    <text x="0" y="0" font-family="'Noto Sans JP', sans-serif" font-size="20" font-weight="500" fill="#FCE7EE" text-anchor="middle" letter-spacing="2">
      大手5チェーンを目的別に徹底比較
    </text>
  </g>

  <!-- brand mark -->
  <g transform="translate(600, 560)">
    <text x="0" y="0" font-family="'Noto Sans JP', sans-serif" font-size="14" font-weight="700" fill="#FFD08A" text-anchor="middle" letter-spacing="4">
      ★ リタウン公式ガイド ★
    </text>
  </g>

  <!-- placeholder mark -->
  <g transform="translate(1080, 90)" opacity="0.55">
    <rect x="-80" y="-16" width="160" height="32" fill="#000" fill-opacity="0.35" rx="16"/>
    <text x="0" y="5" font-family="'Poppins', sans-serif" font-size="12" font-weight="700" fill="#FFD08A" text-anchor="middle" letter-spacing="2">
      PLACEHOLDER
    </text>
  </g>
</svg>
